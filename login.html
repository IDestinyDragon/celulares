<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechStore</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .login-container h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .btn-login:hover { background: #34495e; }
        .toggle-link { text-align: center; margin-top: 15px; cursor: pointer; color: #3498db; text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <div class="header-container" style="text-align: center;">
            <h1><a href="index.html" style="color: white; text-decoration: none;">TechStore</a></h1>
        </div>
    </header>

    <main class="contenedor">
        <div class="login-container">
            <h2 id="login-title">Iniciar Sesión</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required placeholder="********">
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            <div id="toggle-registro" class="toggle-link">¿No tienes cuenta? Regístrate aquí</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
